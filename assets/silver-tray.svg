  <rect x="72" y="72" width="756" height="756" rx="48" stroke="#FFFFFF" stroke-opacity=".48"/>
  
      <ellipse cx="450" cy="640" rx="230" ry="40" fill="#1F1B18" fill-opacity=".12"/>
      <g filter="url(#shadow)">
        <rect x="212" y="332" width="476" height="238" rx="44" fill="#E9E5E1"/>
        <rect x="252" y="372" width="396" height="158" rx="26" fill="#FBFBFB"/>
        <circle cx="284" cy="450" r="22" fill="#D8D3CF"/>
        <circle cx="616" cy="450" r="22" fill="#D8D3CF"/>
      </g>
    
  <text x="88" y="836" fill="#5D5146" font-size="34" font-family="Georgia, serif">Silver gallery tray</text>
</svg>