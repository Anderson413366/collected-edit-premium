      <stop stop-color="#F2EAE0"/>
      <stop offset="1" stop-color="#D4C1B3"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 180) rotate(40) scale(480 360)">
      <stop stop-color="#FFFDF9" stop-opacity=".85"/>
      <stop offset="1" stop-color="#FFFDF9" stop-opacity="0"/>
    </radialGradient>
